root = "."
tmp_dir = "tmp"

[build]
  bin = "./bin/eyrie"
  args_bin = ["dashboard", "--no-open"]
  cmd = "go build -ldflags \"-X github.com/Audacity88/eyrie/internal/config.Version=dev\" -o ./bin/eyrie ./cmd/eyrie"
  delay = 500
  exclude_dir = ["tmp", "web", "bin", "node_modules", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml"]
  include_dir = ["cmd", "internal"]
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
