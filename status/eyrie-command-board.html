<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Magnus Eyrie Captain Board</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111314;
      --surface: #181b1d;
      --surface-2: #202427;
      --surface-3: #262b2f;
      --text: #f1f5f4;
      --muted: #a4adaa;
      --line: #343b3f;
      --red: #e45d5d;
      --amber: #d6a84f;
      --teal: #48b5a3;
      --blue: #6aa6e8;
      --green: #63bd75;
      --gray: #89939a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      padding: 24px 28px 18px;
    }

    main {
      padding: 22px 28px 30px;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 27px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      font-size: 16px;
      line-height: 1.25;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 14px;
      line-height: 1.25;
    }

    .muted {
      color: var(--muted);
    }

    .updated {
      text-align: right;
      min-width: 220px;
      color: var(--muted);
      font-size: 13px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat strong {
      display: block;
      font-size: 21px;
      line-height: 1.1;
      margin-bottom: 3px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 280px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .agents,
    .board {
      min-width: 0;
    }

    .agents {
      border-right: 1px solid var(--line);
      padding-right: 18px;
    }

    .agent-list {
      display: grid;
      gap: 10px;
    }

    .agent {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
      padding: 11px 12px;
    }

    .agent-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .agent-role {
      color: var(--muted);
      font-size: 12px;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .column {
      min-width: 0;
      border: 1px solid var(--line);
      background: #141719;
      border-radius: 8px;
      overflow: hidden;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 13px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .column-count {
      color: var(--muted);
      font-size: 12px;
    }

    .cards {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-left: 5px solid var(--gray);
      background: var(--surface-2);
      border-radius: 8px;
      padding: 12px;
    }

    .card[data-priority="high"],
    .card[data-priority="urgent"],
    .card[data-priority="must"] {
      border-left-color: var(--red);
    }

    .card[data-status="waiting"] {
      border-left-color: var(--amber);
    }

    .card[data-status="active"] {
      border-left-color: var(--teal);
    }

    .card[data-status="capture"] {
      border-left-color: var(--blue);
    }

    .card[data-status="done"],
    .card[data-status="complete"] {
      border-left-color: var(--green);
      opacity: 0.78;
    }

    .card:target {
      outline: 2px solid var(--blue);
      box-shadow: 0 0 0 4px rgba(106, 166, 232, 0.18);
    }

    .card-title {
      font-weight: 750;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .summary,
    .next {
      color: var(--muted);
      font-size: 13px;
    }

    .next {
      margin-top: 9px;
      color: var(--text);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .badge {
      border: 1px solid var(--line);
      background: var(--surface-3);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      padding: 4px 8px;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .badge.visible {
      color: var(--teal);
    }

    .empty {
      color: var(--muted);
      padding: 12px;
      font-size: 13px;
    }

    @media (max-width: 1040px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .agents {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding-right: 0;
        padding-bottom: 18px;
      }

      .agent-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .columns {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      header,
      main {
        padding-left: 16px;
        padding-right: 16px;
      }

      .topline {
        display: block;
      }

      .updated {
        text-align: left;
        min-width: 0;
        margin-top: 10px;
      }

      .stats,
      .agent-list,
      .columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topline">
        <div>
          <h1>Magnus/Eyrie Captain Board</h1>
          <p class="muted">Local Eyrie task state with Commander-visible summary items.</p>
        </div>
        <div class="updated" id="updated"></div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </header>

  <main>
    <div class="wrap layout">
      <section class="agents" aria-labelledby="agents-title">
        <h2 id="agents-title">Agents</h2>
        <div class="agent-list" id="agents"></div>
      </section>
      <section class="board" aria-labelledby="board-title">
        <h2 id="board-title">Work</h2>
        <div class="columns" id="columns"></div>
      </section>
    </div>
  </main>

  <script src="eyrie-command-board-data.js"></script>
  <script>
    const board = window.eyrieCommandBoard || { items: [], agents: [], counts: {} };

    const lanes = [
      ["active", "Active"],
      ["monitoring", "Monitoring"],
      ["backlog", "Backlog"],
      ["local", "Local Queue"],
    ];

    function text(value) {
      return String(value || "");
    }

    function el(tag, className, content) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (content !== undefined) node.textContent = content;
      return node;
    }

    function renderStats() {
      const stats = document.getElementById("stats");
      const counts = board.counts || {};
      const rows = [
        ["Total", counts.total || 0],
        ["Commander", counts.commander_visible || 0],
        ["Local", counts.local_only || 0],
        ["Active", (counts.by_status && counts.by_status.active) || 0],
        ["Waiting", (counts.by_status && counts.by_status.waiting) || 0],
      ];
      rows.forEach(([label, value]) => {
        const node = el("div", "stat");
        node.append(el("strong", "", value));
        node.append(el("span", "muted", label));
        stats.append(node);
      });
    }

    function renderAgents() {
      const root = document.getElementById("agents");
      board.agents.forEach((agent) => {
        const node = el("article", "agent");
        node.append(el("div", "agent-name", agent.name));
        node.append(el("div", "agent-role", agent.role));
        node.append(el("div", "badge", agent.status));
        root.append(node);
      });
    }

    function renderCard(item) {
      const card = el("article", "card");
      card.id = "item=" + encodeURIComponent(item.id);
      card.dataset.status = item.status || "";
      card.dataset.priority = item.priority || "";

      card.append(el("div", "card-title", item.title));
      card.append(el("p", "summary", item.summary));
      card.append(el("p", "next", item.next_action));

      const badges = el("div", "badges");
      badges.append(el("span", "badge", item.status));
      badges.append(el("span", "badge", item.priority));
      badges.append(el("span", "badge", item.primary_agent));
      if (item.commander_visible) {
        badges.append(el("span", "badge visible", "Commander-visible"));
      } else {
        badges.append(el("span", "badge", "Local-only"));
      }
      card.append(badges);
      return card;
    }

    function renderColumns() {
      const root = document.getElementById("columns");
      lanes.forEach(([lane, title]) => {
        const items = board.items.filter((item) => item.lane === lane);
        const column = el("section", "column");
        const header = el("div", "column-header");
        header.append(el("h3", "", title));
        header.append(el("span", "column-count", items.length));
        column.append(header);

        const cards = el("div", "cards");
        if (items.length) {
          items.forEach((item) => cards.append(renderCard(item)));
        } else {
          cards.append(el("div", "empty", "No items"));
        }
        column.append(cards);
        root.append(column);
      });
    }

    document.getElementById("updated").textContent = board.generated_at
      ? "Generated " + board.generated_at
      : "";
    renderStats();
    renderAgents();
    renderColumns();
  </script>
</body>
</html>
